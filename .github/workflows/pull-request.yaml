name: PR Checks

on:
  workflow_dispatch: {}
  pull_request: {}


permissions:
  contents: read

# When a new revision is pushed to a PR, cancel all in-progress CI runs for that
# PR. See https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release-check:
    name: Release Version Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Fetch full history to access all commits
          persist-credentials: false

      - name: Check for release commits
        id: check-release
        run: |
          RESULT=$(./scripts/get-release-from-commits.sh "origin/${GITHUB_BASE_REF}" "HEAD")
          echo "Release commits detected: $RESULT"
          if [ -n "$RESULT" ]; then
            echo "result=true" >> $GITHUB_OUTPUT
            echo "commit_version=$RESULT" >> $GITHUB_OUTPUT
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

      - name: Get CHANGELOG version from PR
        if: steps.check-release.outputs.result == 'true'
        id: changelog
        run: |
          CHANGELOG_VERSION=$(grep -o -E '## [0-9.]+' CHANGELOG.md | head -n 1 | sed 's/## //' | grep -E '^[0-9.]+$' || echo "invalid")
          echo "version=$CHANGELOG_VERSION" >> "$GITHUB_OUTPUT"

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Get Gradle project version
        if: steps.check-release.outputs.result == 'true'
        id: gradle
        run: |
          GRADLE_VERSION=$(./gradlew properties | grep "^version:" | cut -d' ' -f2)
          echo "version=$GRADLE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify release versions match
        if: steps.check-release.outputs.result == 'true'
        env:
          COMMIT_VERSION: ${{ steps.check-release.outputs.commit_version }}
          CHANGELOG_VERSION: ${{ steps.changelog.outputs.version }}
          GRADLE_VERSION: ${{ steps.gradle.outputs.version }}
        run: |
          echo "ℹ️ Release Commit Detected"
          echo ""
          echo "This PR contains commit(s) that match the case-insensitive regex \`^Release .*\`"
          echo ""
          echo "Here are the latest versions reported from the places the release workflows will use:"
          echo ""
          echo "| Source | Version |"
          echo "| --- | --- |"
          echo "| Commit matching \`^Release .*\` | $COMMIT_VERSION |"
          echo "| \`CHANGELOG.md\` | $CHANGELOG_VERSION |"
          echo "| \`gradle properties\` project version (from \`gradle.properties\`) | $GRADLE_VERSION |"
          echo ""

          if [ "$COMMIT_VERSION" != "$CHANGELOG_VERSION" ]; then
            echo "❌ Version mismatch detected! All sources must agree before creating a release." >&2
            exit 1
          fi

          echo "✅ All version sources agree: $COMMIT_VERSION"

  test-and-lint:
    name: Test and Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Pre-pull container image
        run: docker pull ghcr.io/open-policy-agent/eopa:latest
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - run: ./gradlew test lint checkstyleMain checkstyleTest jar
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"
      - name: Publish Checkstyle report
        uses: Juuxel/publish-checkstyle-report@943ac25b84c09edf93a4e2846133ed1636686a35 # v2.0.0
        if: ${{ failure() || success() }}
        with:
          # required: The glob paths to report XML files as a multiline string
          # The format below works for the Gradle Checkstyle plugin with default configurations
          reports: |
            build/reports/checkstyle/*.xml

  gh-actions-lint:
    name: Github Actions Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d # v0.5.0